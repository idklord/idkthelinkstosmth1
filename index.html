<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Dashboard</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 400px; }
        h2 { margin-top: 0; color: #3b82f6; font-size: 1.5rem; }
        input[type="text"] { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        input[type="text"]:focus { border-color: #3b82f6; outline: none; }
        .btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.2s; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .info { margin-top: 20px; color: #64748b; font-size: 0.8rem; }
        strong { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Web Launcher</h2>
        <input type="text" id="urlInput" placeholder="Paste link here...">
        
        <button class="btn" onclick="launchCustom()">Launch Cloaked</button>
        
        <div class="info">Panic Key: <strong>ESC</strong> (Redirects to Google Classroom)</div>
    </div>

    <script>
    function launchCustom() {
        let targetUrl = document.getElementById('urlInput').value.trim();
        // Safe site changed to Google Classroom
        const safeSite = "https://classroom.google.com";

        if (!targetUrl) {
            alert("Please paste a URL first!");
            return;
        }
        
        if (!targetUrl.startsWith('http')) {
            targetUrl = 'https://' + targetUrl;
        }

        const win = window.open('about:blank', '_blank');
        
        if (win) {
            win.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <!-- Tab title changed for stealth -->
                    <title>Classes</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                        iframe { width: 100%; height: 100%; border: none; }
                    </style>
                </head>
                <body>
                    <iframe src="${targetUrl}" allow="autoplay; fullscreen; clipboard-read; clipboard-write"></iframe>
                    <script>
                        window.addEventListener('keydown', (e) => {
                            if (e.key === 'Escape') {
                                window.location.replace('${safeSite}');
                            }
                        });
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
        } else {
            alert("Pop-up blocked! Please click the icon in your address bar and select 'Always Allow'.");
        }
    }
    </script>
</body>
</html>
